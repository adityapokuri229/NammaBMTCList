<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Namma BMTC DB — Bangalore Bus Route Directory</title>
  <meta name="description" content="Browse 2000+ BMTC bus routes across Bangalore. Search by route number, filter by category, and view stop sequences." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- LOADING -->
  <div id="loading">
    <div class="spinner"></div>
    <h2>Loading Directory</h2>
    <p>Phase 2026 dataset</p>
  </div>

  <!-- APP -->
  <div id="app" style="display:none">

    <!-- HEADER -->
    <header id="header">
      <div class="header-content">
        <div id="logo-block">
          <div id="logo" onclick="resetView()">Namma BMTC <span>DB</span></div>
          <div id="logo-sub">Bangalore Bus Route Directory</div>
        </div>
        
        <div id="search-wrap">
          <svg id="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="search" type="text" placeholder="Search routes, destinations..." autocomplete="off" />
        </div>

        <div id="view-toggle">
          <button id="btn-list" class="active" onclick="setViewMode('list')">List</button>
          <button id="btn-map" onclick="setViewMode('map')">Map</button>
        </div>
      </div>
    </header>

    <!-- CATEGORY NAVIGATION -->
    <nav id="categories-nav">
      <div class="cat-track" id="cat-list">
        <!-- Pills injected by JS -->
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main id="main">
      <div id="list-view" class="content-wrapper">
        <div id="stats-bar">
          <div id="route-count-display">
            <span id="route-count">0</span> Routes
          </div>
          <div id="live-dot"><span>LIVE</span><div class="pulse"></div></div>
        </div>

        <div id="route-grid">
          <!-- Cards injected by JS -->
        </div>
      </div> <!-- end list-view -->
      
      <div id="map-view" style="display:none;">
        <div id="map-controls">
          <input type="text" id="map-stop-search" placeholder="Locate a stop on map..." autocomplete="off"/>
          <div id="map-stop-results"></div>
        </div>
      </div>
    </main>
    
    <!-- DETAIL OVERLAY -->
    <div id="overlay-backdrop" onclick="closeDetail()"></div>
    <aside id="detail-panel">
      <!-- Detail content injected by JS -->
    </aside>

  </div>

  <script src="app.js"></script>
</body>
</html>
