<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Namma BMTC DB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="description"
    content="Browse 2000+ BMTC bus routes across Bangalore. Search by route number, filter by category, and view stop sequences." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background: var(--bg-base);
    }

    .landing-container {
      text-align: center;
      padding: 40px 24px;
      max-width: 800px;
      width: 100%;
    }

    .hero-logo {
      font-family: var(--font-display);
      font-size: 56px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .hero-logo span {
      color: var(--accent-base);
    }

    .hero-sub {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 56px;
      letter-spacing: 0.02em;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }

    .option-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      text-decoration: none;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }

    .option-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--card-color, var(--text-dim));
      transition: height var(--transition);
    }

    .option-card:hover {
      transform: translateY(-4px);
      background: var(--bg-hover);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
    }

    .option-card:hover::before {
      height: 6px;
      box-shadow: 0 0 16px var(--card-color, var(--text-dim));
    }

    .option-icon {
      width: 56px;
      height: 56px;
      margin-bottom: 24px;
      color: var(--card-color, var(--text-muted));
      transition: transform var(--transition);
    }

    .option-card:hover .option-icon {
      transform: scale(1.1);
    }

    .option-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .option-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      .options-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .hero-logo {
        font-size: 40px;
      }

      .hero-sub {
        margin-bottom: 40px;
      }

      .option-card {
        padding: 32px 24px;
      }
    }
  </style>
</head>

<body>

  <div class="landing-container">
    <div class="hero-logo">Namma BMTC <span>DB</span></div>
    <div class="hero-sub">A Minimal Bengaluru Bus Route Directory</div>

    <div class="options-grid">
      <a href="map.html" class="option-card" style="--card-color: #10b981;">
        <svg class="option-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
          <line x1="9" y1="3" x2="9" y2="18"></line>
          <line x1="15" y1="6" x2="15" y2="21"></line>
        </svg>
        <div class="option-title">Map View</div>
        <div class="option-desc">Interactive geographic map displaying all stops and precise routes visually.</div>
      </a>

      <a href="list.html" class="option-card" style="--card-color: #10b981;">
        <svg class="option-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"></line>
          <line x1="8" y1="12" x2="21" y2="12"></line>
          <line x1="8" y1="18" x2="21" y2="18"></line>
          <line x1="3" y1="6" x2="3.01" y2="6"></line>
          <line x1="3" y1="12" x2="3.01" y2="12"></line>
          <line x1="3" y1="18" x2="3.01" y2="18"></line>
        </svg>
        <div class="option-title">List View</div>
        <div class="option-desc">Search, filter, and browse details of over 2000+ BMTC buses.</div>
      </a>
    </div>
  </div>

</body>

</html>
